# ============================================================
# SNORT CONFIGURATION - PROJECT PESBUK
# File: /etc/snort/snort.conf
# ============================================================

# ------------------------------------------------------------
# 1. NETWORK VARIABLES
# ------------------------------------------------------------
# any: monitor semua IP (cocok untuk lab Docker)
ipvar HOME_NET any
ipvar EXTERNAL_NET any

# Server variables (dibutuhkan community rules)
ipvar HTTP_SERVERS any
ipvar SQL_SERVERS any
ipvar SMTP_SERVERS any
ipvar TELNET_SERVERS any
ipvar DNS_SERVERS any
ipvar SNMP_SERVERS any

# Port variables
portvar HTTP_PORTS [80,443,3000,8080,8443]
portvar ORACLE_PORTS 1521
portvar SSH_PORTS 22

# Port variables tambahan — wajib untuk community rules
# Catatan: tidak bisa pakai $VAR di dalam list portvar, harus angka langsung
portvar FILE_DATA_PORTS [80,443,3000,8080,8443,110,143]
portvar FTP_PORTS [21,2100,3535]
portvar SHELLCODE_PORTS !80
portvar SMTP_PORTS [25,587,465]
portvar POP_PORTS [110,995]
portvar IMAP_PORTS [143,993]
portvar TELNET_PORTS 23
portvar GTP_PORTS [2123,2152,3386]
portvar SIP_PORTS [5060,5061,5600]
portvar DNP3_PORTS 20000
portvar MODBUS_PORTS 502

# ipvar tambahan — dipakai beberapa community rules
ipvar AIM_SERVERS [64.12.24.0/23,64.12.28.0/23,64.12.161.0/24,64.12.163.0/24,205.188.3.0/24,205.188.5.0/24,205.188.7.0/24,205.188.9.0/24]

# ------------------------------------------------------------
# 2. DECODER & DETECTION ENGINE
# ------------------------------------------------------------
config checksum_mode: none
config detection: search-method ac-split search-optimize max-pattern-len 20

# ------------------------------------------------------------
# 3. OUTPUT — Simpan alert ke file log
# ------------------------------------------------------------
output alert_fast: /var/log/snort/alert.log
output log_tcpdump: /var/log/snort/snort.log

# ------------------------------------------------------------
# 4. PREPROCESSOR
# ------------------------------------------------------------
preprocessor stream5_global: track_tcp yes
preprocessor stream5_tcp: policy first

# SSL preprocessor — wajib untuk community rules yang pakai keyword ssl_state
preprocessor ssl: noinspect_encrypted

# ------------------------------------------------------------
# 5. CLASSIFICATION CONFIG
# Wajib ada agar keyword "classtype:" di community rules dikenali
# ------------------------------------------------------------
include /etc/snort/classification.config

# ------------------------------------------------------------
# 6. PILIH MODE RULES
#
# MODE LOCAL (default - rule buatan sendiri):
#   → Aktifkan baris "include local.rules"
#   → Komentari baris "include community.rules"
#
# MODE COMMUNITY (rule dari Sourcefire/komunitas):
#   → Komentari baris "include local.rules"
#   → Aktifkan baris "include community.rules"
#
# Gunakan script: sudo bash ~/pesbuk/snort/switch-rules.sh local
#             atau sudo bash ~/pesbuk/snort/switch-rules.sh community
# ------------------------------------------------------------

# [AKTIF] MODE: LOCAL RULES
include /etc/snort/rules/local.rules

# [NONAKTIF] MODE: COMMUNITY RULES (uncomment untuk menggunakan)
# include /etc/snort/rules/community.rules
