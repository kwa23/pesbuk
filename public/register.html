<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Buat Akun</title>
    <!-- Hubungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header biru dengan form login -->
    <header>
        <div class="header-left">
            facebook
        </div>
        <div class="header-right">
            <form action="login.php" method="post">
                <div class="form-group">
                    <label for="username">Email atau Nomor Telepon</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </header>

    <!-- Konten utama -->
    <div class="main-container">
        <!-- Bagian kiri: teks deskripsi -->
        <div class="left-section">
            <h1>Facebook membantu Anda terhubung dan berbagi dengan orang-orang dalam kehidupan Anda.</h1>
        </div>

        <!-- Bagian kanan: form registrasi -->
        <div class="register-container">
        <h2>Buat Akun</h2>
        <p>Gratis Selamanya.</p>
        <form action="register.php" method="post">
        <div class="name-row">
            <input type="text" id="firstname" name="firstname" placeholder="Nama Depan" required>
            <input type="text" id="lastname" name="lastname" placeholder="Nama Belakang" required>
        </div>
        <div class="form-group">
            <input type="text" id="email" name="email" placeholder="Nomor HP atau Email" required>
        </div>
        <div class="form-group">
            <input type="password" id="newpassword" name="newpassword" placeholder="Password Baru" required>
        </div>
        <button type="submit">Daftar</button>
    </form>
</div>
    </div>
</body>
</html>
