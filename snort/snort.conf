# ============================================================
# SNORT CONFIGURATION - PROJECT PESBUK
# File: /etc/snort/snort.conf
# ============================================================

# ------------------------------------------------------------
# 1. NETWORK VARIABLES
# ------------------------------------------------------------
# any: monitor semua IP (cocok untuk lab Docker)
ipvar HOME_NET any

# Semua IP selain HOME_NET dianggap external
ipvar EXTERNAL_NET !$HOME_NET

# Port web server Node.js
portvar HTTP_PORTS 3000

# ------------------------------------------------------------
# 2. DECODER & DETECTION ENGINE
# ------------------------------------------------------------
config checksum_mode: none
config detection: search-method ac-split search-optimize max-pattern-len 20

# ------------------------------------------------------------
# 3. OUTPUT — Simpan alert ke file log
# ------------------------------------------------------------
output alert_fast: /var/log/snort/alert.log
output log_tcpdump: /var/log/snort/snort.log

# ------------------------------------------------------------
# 4. PREPROCESSOR
# Gunakan detect_anomalous_servers (tidak perlu unicode.map)
# ------------------------------------------------------------
preprocessor http_inspect: global detect_anomalous_servers

preprocessor http_inspect_server: server default \
    profile all \
    ports { 3000 80 } \
    oversize_dir_length 500 \
    inspect_gzip \
    normalize_utf \
    normalize_javascript \
    normalize_cookies \
    normalize_headers

# ------------------------------------------------------------
# 5. INCLUDE LOCAL RULES
# ------------------------------------------------------------
include /etc/snort/rules/local.rules
