services:

  # ========================
  # Container 1: Web Server + Database
  # IP Static: 172.20.0.2
  # ========================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pesbuk-app_101032330051
    volumes:
      - pesbuk_data:/app/data
    networks:
      pesbuk-network:
        ipv4_address: 172.20.0.2   # IP tetap untuk web server

  # ========================
  # Container 2: Snort IDS
  # Pakai network_mode: host agar bisa monitor bridge pesbuk-br dari sisi host
  # Tidak mendapat IP dari pesbuk-network (menggunakan IP host langsung)
  # ========================
  snort:
    build:
      context: ./snort
      dockerfile: Dockerfile.snort
    container_name: pesbuk-snort_101032330051
    network_mode: host          # akses langsung ke interface host (termasuk pesbuk-br)
    cap_add:
      - NET_ADMIN               # izin monitor jaringan
      - NET_RAW                 # izin baca raw packet
    volumes:
      - ./snort/logs:/var/log/snort                                              # log alert tersimpan di host
      - ./snort/snort.conf:/etc/snort/snort.conf:ro                              # mount dari host → switch tanpa rebuild
      - ./snort/classification.config:/etc/snort/classification.config:ro        # wajib untuk community rules
      - ./snort/rules/local.rules:/etc/snort/rules/local.rules:ro                # local rules
      - ./community-rules/community.rules:/etc/snort/rules/community.rules:ro    # community rules dari Sourcefire
    depends_on:
      - app
      - nginx

  # ========================
  # Container 3: Nginx (HTTPS + reverse proxy)
  # IP Static: 172.20.0.3
  # ========================
  nginx:
    image: nginx:alpine
    container_name: pesbuk-nginx_101032330051
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl/cert.pem:/etc/ssl/cert.pem
      - ./ssl/key.pem:/etc/ssl/key.pem
    depends_on:
      - app
    networks:
      pesbuk-network:
        ipv4_address: 172.20.0.3   # IP tetap untuk nginx

  # ========================
  # Container 4: User / Attacker
  # IP Static: 172.20.0.4
  # Ubuntu dengan tools serangan: curl, hydra, sqlmap, nmap
  # Cara pakai: docker exec -it pesbuk-user_101032330051 bash
  # ========================
  user:
    build:
      context: ./user
      dockerfile: Dockerfile.user
    container_name: pesbuk-user_101032330051
    networks:
      pesbuk-network:
        ipv4_address: 172.20.0.4   # IP tetap untuk container attacker
    stdin_open: true
    tty: true
    cap_add:
      - NET_RAW               # izin kirim raw packet (dibutuhkan nmap SYN/XMAS/NULL/FIN scan)

networks:
  pesbuk-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: pesbuk-br   # nama bridge TETAP agar Snort bisa monitor
    ipam:                      # IP Address Management — konfigurasi IP static
      config:
        - subnet: 172.20.0.0/24   # rentang IP jaringan Docker
          gateway: 172.20.0.1     # IP host di sisi bridge (pesbuk-br)

volumes:
  pesbuk_data:
